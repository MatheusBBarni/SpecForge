name: Learn From Reviews

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

jobs:
  learn:
    if: contains(github.event.review.body, '@claude-learn')
    runs-on: ubuntu-latest

    steps:
      - name: Check out default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Extract safe rule
        id: extract
        uses: actions/github-script@v7
        env:
          REVIEW_BODY: ${{ github.event.review.body }}
        with:
          script: |
            const body = process.env.REVIEW_BODY || "";
            const match = body.match(/@claude-learn\s+(.+)/i);

            if (!match) {
              core.setOutput("rule", "");
              return;
            }

            const rule = match[1].trim().replace(/\s+/g, " ");
            const allowed = /^[A-Za-z0-9 ,.;:()\/'"[\]_-]+$/;

            if (rule.length > 200) {
              core.setFailed("Rejected @claude-learn content because it exceeds 200 characters.");
              return;
            }

            if (/[`]/.test(rule) || /\$\(|\$\{/.test(rule)) {
              core.setFailed("Rejected @claude-learn content because it contains unsafe shell syntax.");
              return;
            }

            if (!allowed.test(rule)) {
              core.setFailed("Rejected @claude-learn content because it contains unsupported characters.");
              return;
            }

            core.setOutput("rule", rule);

      - name: Update AGENTS.md
        if: steps.extract.outputs.rule != ''
        uses: actions/github-script@v7
        env:
          SAFE_RULE: ${{ steps.extract.outputs.rule }}
        with:
          script: |
            const fs = require("fs");
            const path = "AGENTS.md";
            const marker = "## Learned Rules";
            const rule = process.env.SAFE_RULE;
            const bullet = `- MUST ${rule}`;

            let text = fs.readFileSync(path, "utf8");

            if (text.includes(bullet)) {
              core.info("Rule already present in AGENTS.md.");
              return;
            }

            if (!text.includes(marker)) {
              core.setFailed('AGENTS.md is missing the "## Learned Rules" section.');
              return;
            }

            text = text.replace(marker, `${marker}\n${bullet}`);
            fs.writeFileSync(path, text);

      - name: Create pull request
        if: steps.extract.outputs.rule != ''
        uses: peter-evans/create-pull-request@v7
        with:
          branch: codex/claude-learn-${{ github.run_id }}
          commit-message: docs: learn rule from review
          title: docs: learn rule from review
          body: |
            Adds a new AGENTS.md rule from reviewer feedback.

            Source review: ${{ github.event.review.html_url }}

            Learned rule:
            - MUST ${{ steps.extract.outputs.rule }}
